{% extends 'base.html' %}
{% load static %}

{% block title %}Déconnexion - RoyalMods{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Déconnexion</h1>
            <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary btn-full">Se déconnecter</button>
        </form>

        <div class="auth-links">
            <a href="{% url 'core:home' %}">Retour à l'accueil</a>
        </div>
    </div>
</div>
{% endblock %}
